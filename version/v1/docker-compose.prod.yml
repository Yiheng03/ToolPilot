services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: toolpilot-backend
    env_file:
      - .env.production
    expose:
      - "8000"
    networks:
      - toolpilot-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: toolpilot-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8021:80"
    networks:
      - toolpilot-net
    restart: unless-stopped

networks:
  toolpilot-net:
    driver: bridge
